# Custom Semgrep Rules für GlitchHunter
# OWASP Top 10 2025 + API Security

rules:
  # A03: Injection - SQL Injection via string concatenation
  - id: python-sql-injection-concat
    patterns:
      - pattern: |
          $CURSOR.execute($SQL)
      - metavariable-pattern:
          metavariable: $SQL
          pattern: |
            f"..."
    message: >
      Potential SQL Injection via f-string in execute().
      Use parameterized queries instead.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: A03:2021-Injection
      cwe: CWE-89
      category: security
  
  # A03: Injection - Command Injection
  - id: python-command-injection-os-system
    pattern: os.system($CMD)
    message: >
      Potential command injection via os.system().
      Use subprocess with shell=False and list arguments.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: A03:2021-Injection
      cwe: CWE-78
      category: security
  
  # A03: Injection - Dangerous eval/exec
  - id: python-dangerous-eval
    pattern: eval($INPUT)
    message: >
      Use of eval() is dangerous.
      Avoid eval() with user input.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: A03:2021-Injection
      cwe: CWE-95
      category: security
  
  - id: python-dangerous-exec
    pattern: exec($INPUT)
    message: >
      Use of exec() is dangerous.
      Avoid exec() with user input.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: A03:2021-Injection
      cwe: CWE-95
      category: security
  
  # A02: Cryptographic Failures - Weak hash
  - id: python-weak-hash-md5
    pattern: hashlib.md5($DATA)
    message: >
      MD5 is cryptographically weak.
      Use SHA-256 or bcrypt for passwords.
    languages:
      - python
    severity: WARNING
    metadata:
      owasp: A02:2021-Cryptographic Failures
      cwe: CWE-327
      category: security
  
  # A02: Hardcoded credentials
  - id: python-hardcoded-password
    patterns:
      - pattern: |
          $VAR = "$PASSWORD"
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|pwd|secret|api_key|apikey)
    message: >
      Hardcoded credential detected.
      Use environment variables or secret management.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: A02:2021-Cryptographic Failures
      cwe: CWE-798
      category: security
  
  # A01: Broken Access Control - Admin check
  - id: python-weak-admin-check
    pattern: |
      if $USER == "admin":
        ...
    message: >
      Weak admin check. Use proper role-based access control.
    languages:
      - python
    severity: WARNING
    metadata:
      owasp: A01:2021-Broken Access Control
      cwe: CWE-284
      category: security
  
  # A07: Auth Failures - Plain text password comparison
  - id: python-plaintext-password-compare
    pattern: |
      if $INPUT_PASSWORD == $STORED_PASSWORD:
        ...
    message: >
      Plain text password comparison detected.
      Use bcrypt or argon2 for password hashing.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: A07:2021-Identification and Authentication Failures
      cwe: CWE-287
      category: security
  
  # A10: SSRF - User-controlled URL
  - id: python-ssrf-requests
    pattern: requests.get($URL)
    message: >
      Potential SSRF if $URL is user-controlled.
      Validate URLs against allowlist.
    languages:
      - python
    severity: WARNING
    metadata:
      owasp: A10:2021-Server-Side Request Forgery
      cwe: CWE-918
      category: security
  
  # API Security - BOLA
  - id: python-api-bola
    patterns:
      - pattern: |
          def $FUNC(request, $ID_PARAM):
            ...
            $OBJ = $MODEL.objects.get(id=$ID_PARAM)
            ...
            return $OBJ
      - metavariable-pattern:
          metavariable: $ID_PARAM
          pattern: |
            request.$GETTER
    message: >
      Potential BOLA: Object accessed without authorization check.
      Verify user has permission to access this object.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: API Security Top 10 - BOLA
      cwe: CWE-639
      category: security
  
  # API Security - Missing rate limiting
  - id: python-api-no-rate-limit
    patterns:
      - pattern: |
          @app.route($ROUTE)
          def $FUNC(...):
            ...
      - pattern-not-inside: |
          @limiter.limit(...)
          ...
    message: >
      API endpoint without rate limiting.
      Add rate limiting to prevent abuse.
    languages:
      - python
    severity: WARNING
    metadata:
      owasp: API Security Top 10 - Rate Limiting
      cwe: CWE-770
      category: security
  
  # A05: Security Misconfiguration - Debug mode
  - id: python-debug-mode-enabled
    pattern: |
      app.run(..., debug=True, ...)
    message: >
      Debug mode enabled in production.
      Set debug=False for production deployments.
    languages:
      - python
    severity: WARNING
    metadata:
      owasp: A05:2021-Security Misconfiguration
      cwe: CWE-11
      category: security
  
  # A08: Software/Data Integrity - Insecure deserialization
  - id: python-insecure-deserialize
    pattern: pickle.loads($DATA)
    message: >
      Insecure deserialization with pickle.
      Never deserialize untrusted data with pickle.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: A08:2021-Software and Data Integrity Failures
      cwe: CWE-502
      category: security

  # Correctness: Missing error handling
  - id: python-missing-error-handling
    patterns:
      - pattern: |
          try:
            ...
          except $EXCEPTION:
            pass
    message: >
      Bare except clause with pass silently swallows exceptions.
      Log the exception or handle it properly.
    languages:
      - python
    severity: WARNING
    metadata:
      category: correctness
      cwe: CWE-324

  # Correctness: Resource not closed
  - id: python-resource-not-closed
    patterns:
      - pattern: |
          $VAR = open($FILE, ...)
          ...
      - pattern-not-inside: |
          with open(...) as $VAR:
            ...
    message: >
      File opened without context manager.
      Use 'with open(...)' to ensure proper cleanup.
    languages:
      - python
    severity: WARNING
    metadata:
      category: correctness
      cwe: CWE-775

  # Correctness: Mutable default argument
  - id: python-mutable-default-argument
    patterns:
      - pattern: |
          def $FUNC(..., $ARG=[]):
              ...
      - pattern-not: |
          def $FUNC(..., $ARG=[]):
              ...
              $ARG = [...]
    message: >
      Mutable default argument (list/dict) can cause unexpected behavior.
      Use None as default and create new instance inside function.
    languages:
      - python
    severity: WARNING
    metadata:
      category: correctness
      cwe: CWE-398

  # Correctness: Uninitialized variable
  - id: python-uninitialized-variable
    pattern: |
      if $COND:
          $VAR = $VALUE
      ...
      return $VAR
    message: >
      Variable may be used uninitialized if condition is False.
      Initialize variable before the conditional.
    languages:
      - python
    severity: ERROR
    metadata:
      category: correctness
      cwe: CWE-457

  # Security: Path traversal
  - id: python-path-traversal-open
    patterns:
      - pattern: open($PATH, ...)
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern: |
                request.$GETTER
    message: >
      Potential path traversal: user input used in file path.
      Validate and sanitize file paths.
    languages:
      - python
    severity: ERROR
    metadata:
      owasp: A01:2021-Broken Access Control
      cwe: CWE-22
      category: security

  # Correctness: Race condition with file check
  - id: python-race-condition-file-check
    pattern: |
      if os.path.exists($PATH):
          ...
          open($PATH, ...)
    message: >
      TOCTOU race condition: file check followed by file operation.
      Use try/except or atomic operations.
    languages:
      - python
    severity: WARNING
    metadata:
      category: correctness
      cwe: CWE-367

  # Security: Weak random for security
  - id: python-weak-random-security
    patterns:
      - pattern: random.$FUNC($ARGS)
      - metavariable-regex:
          metavariable: $FUNC
          regex: (random|choice|randint|randrange|sample)
    message: >
      Weak random number generator used.
      Use secrets module for security-critical operations.
    languages:
      - python
    severity: WARNING
    metadata:
      owasp: A02:2021-Cryptographic Failures
      cwe: CWE-330
      category: security
