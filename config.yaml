# GlitchHunter Konfiguration
# Unterstützt Stack A (GTX 3060, 8GB) und Stack B (RTX 3090, 24GB)

hardware:
  # Stack A: Sequentiell, Security-Lite
  stack_a:
    name: "GTX 3060"
    vram_limit: 8  # GB
    cuda_compute: "8.6"
    mode: "sequential"
    
    models:
      primary:
        name: "qwen3.5-9b"
        path: "/home/schaf/stuff/offline_llm/models/Qwen3.5-9B-UncensoredHauhauCS-Aggressive-Q4_K_M.gguf"
        context_length: 8192
        n_gpu_layers: 35
        n_threads: 8
      
      secondary:
        name: "phi-4-mini"
        path: "models/phi-4-mini-instruct.Q4_K_M.gguf"
        context_length: 4096
        n_gpu_layers: 25
        n_threads: 6
    
    security:
      enabled: true
      level: "lite"
      owasp_top10: true
      api_security: false
      attack_scenarios: false
    
    inference:
      max_batch_size: 1
      parallel_requests: false
      turbo_quant: true
      server_port: 8080
      chat_template: "src/inference/templates/qwen_de.jinja"
    
  # Stack B: Parallel, Full Security
  stack_b:
    name: "RTX 3090"
    vram_limit: 24  # GB
    cuda_compute: "8.6"
    mode: "parallel"
    
    models:
      primary:
        name: "qwen3.5-27b"
        path: "models/Qwen3.5-27B-Instruct-Q4_K_M.gguf"
        context_length: 16384
        n_gpu_layers: 50
        n_threads: 12
      
      secondary:
        name: "deepseek-v3.2-small"
        path: "models/DeepSeek-V3.2-Small-Q4_K_M.gguf"
        context_length: 8192
        n_gpu_layers: 40
        n_threads: 10
    
    security:
      enabled: true
      level: "full"
      owasp_top10: true
      api_security: true
      attack_scenarios: true
    
    inference:
      max_batch_size: 4
      parallel_requests: true
      turbo_quant: true

# Pre-Filter Konfiguration (für beide Stacks)
prefilter:
  enabled: true
  
  semgrep:
    enabled: true
    rules:
      - "security"
      - "correctness"
      - "performance"
    custom_rules_path: "src/security/rules"
  
  ast:
    enabled: true
    languages:
      - "python"
      - "javascript"
      - "typescript"
      - "go"
      - "java"
  
  complexity:
    enabled: true
    max_cyclomatic: 10  # Von 15 auf 10 gesenkt für mehr Hotspots
    max_cognitive: 20   # Von 25 auf 20 gesenkt
    max_nesting: 4      # Von 5 auf 4 gesenkt
    tool: "radon"  # oder "lizard"

# Agent Konfiguration
agent:
  states:
    - "analyzer"
    - "verifier"
    - "sandbox_executor"
    - "patch_generator"
    - "finalizer"
  
  max_iterations: 5
  timeout_per_state: 300  # Sekunden
  
  sandbox:
    enabled: true
    docker_image: "python:3.11-slim"
    network_disabled: true
    timeout: 60

# Mapper Konfiguration
mapper:
  enabled: true
  use_ctags: true
  use_tree_sitter: true
  symbol_graph: true
  repomix:
    enabled: true
    output_format: "xml"

# Cache Konfiguration für Symbol Graph
cache:
  enabled: true
  symbol_graph_persist: true
  persist_path: ".glitchhunter/cache/symbol_graph.pkl"
  auto_invalidate: true  # Bei Repo-Änderung
  auto_persist: true     # Auto-save beim Shutdown
  redis:
    enabled: false
    host: "localhost"
    port: 6379
    ttl_days: 7
    key_prefix: "symbol_graph"

# Embedding und Vector-DB Konfiguration
embeddings:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  cache_dir: ".glitchhunter/embeddings"
  device: null  # null = auto, oder "cpu", "cuda"

learned_rules:
  vector_db: "qdrant"  # "qdrant" oder "chromadb"
  collection: "learned_rules"
  auto_learn: true  # Nach jedem Fix automatisch lernen
  min_similarity: 0.7  # Minimum Similarity für Rule-Matching
  top_k: 5  # Standard Anzahl Similarity-Ergebnisse
  
  qdrant:
    host: "localhost"
    port: 6379
    https: false
    timeout: 30
    
  chromadb:
    persist_dir: ".glitchhunter/chroma"
    anonymized_telemetry: false

# API Konfiguration
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
  
  rate_limit:
    enabled: true
    requests_per_minute: 60
  
  auth:
    enabled: false
    api_key_header: "X-API-Key"

# MCP Integration (SocratiCode)
mcp_integration:
  enabled: true
  server:
    host: "localhost"
    port: 8934
    timeout_seconds: 60
  socratiCode:
    auto_index: true
    index_on_start: true

# Logging Konfiguration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/glitchhunter.log"
  max_size_mb: 100
  backup_count: 5
  
  # Stack-spezifisches Logging
  stack_a:
    level: "DEBUG"
  
  stack_b:
    level: "DEBUG"

# Feature Toggles
features:
  # Nur für Stack B verfügbar
  parallel_inference: false
  deep_security_scan: false
  multi_model_consensus: false

  # Für beide Stacks
  ast_analysis: true
  complexity_check: true
  basic_security: true
  patch_generation: true
  sandbox_execution: true
  
  # Evidence-Contract (NEW)
  # Mandatory evidence package before auto-fix
  evidence_contract: true
  evidence_gate_enabled: true
  min_evidence_score: 0.5  # Minimum score for auto-fix

# Escalation Level 4 Draft PR Configuration
escalation:
  level_4_draft_pr:
    enabled: true
    github:
      token_env: "GITHUB_TOKEN"
      owner_env: "REPO_OWNER"
      repo_env: "REPO_NAME"
      # Optional: Remote-URL zum Klonen (falls kein lokales Repo)
      # remote_url: "https://github.com/owner/repo.git"
    gitlab:
      url: "https://gitlab.com"
      token_env: "GITLAB_TOKEN"
      project_id_env: "GITLAB_PROJECT_ID"
      # Optional: Remote-URL zum Klonen (falls kein lokales Repo)
      # remote_url: "https://gitlab.com/owner/repo.git"
    auto_push: true
    draft: true
    # Optional: Default Branch für PRs (default: main)
    # base_branch: "main"

# Evidence Gate Konfiguration (NEW)
evidence_gate:
  # Minimum evidence score thresholds by risk class
  min_score_weak: 0.3      # Von 0.4 auf 0.3 gesenkt für mehr Kandidaten
  min_score_medium: 0.4    # Von 0.5 auf 0.4 gesenkt
  min_score_high: 0.5      # Von 0.6 auf 0.5 gesenkt

  # Maximum retries before escalation
  max_retries: 3

  # Require specific evidence components
  require_reproduction: false  # Von true auf false für initiale Scans
  require_affected_symbols: false  # Locker für erste Analyse
  require_violated_invariant: true
  require_scope_classification: true
  require_risk_assessment: true

  # Hypothesis requirements
  min_hypotheses: 2      # Von 3 auf 2 gesenkt
  max_hypotheses: 5
  min_avg_hypothesis_confidence: 0.25  # Von 0.3 auf 0.25 gesenkt

# Pfade
paths:
  models: "models"
  logs: "logs"
  reports: "reports"
  cache: ".cache"
  temp: ".temp"
  security_rules: "src/security/rules"
  llama_tools_path: "/home/schaf/tools/llama-cpp-turboquant-cuda"

# Model Download Configuration
model_downloads:
  # Stack A models (GTX 3060, 8GB VRAM)
  qwen3.5-9b:
    repo_id: "Qwen/Qwen3.5-9B-Instruct-GGUF"
    filename: "qwen3.5-9b-instruct-q4_k_m.gguf"
    description: "Qwen3.5 9B Instruct (Q4_K_M quantization)"
    size_gb: 5.5
    stack: "stack_a"
  
  phi-4-mini:
    repo_id: "bartowski/microsoft_Phi-4-mini-instruct-GGUF"
    filename: "microsoft_Phi-4-mini-instruct-Q4_K_M.gguf"
    description: "Phi-4-mini Instruct (Q4_K_M quantization)"
    size_gb: 2.49
    stack: "stack_a"
  
  # Stack B models (RTX 3090, 24GB VRAM)
  qwen3.5-27b:
    repo_id: "Qwen/Qwen3.5-27B-Instruct-GGUF"
    filename: "qwen3.5-27b-instruct-q4_k_m.gguf"
    description: "Qwen3.5 27B Instruct (Q4_K_M quantization)"
    size_gb: 16.0
    stack: "stack_b"
  
  deepseek-v3.2-small:
    repo_id: "deepseek-ai/DeepSeek-V3.2-Small-GGUF"
    filename: "deepseek-v3.2-small-q4_k_m.gguf"
    description: "DeepSeek-V3.2 Small (Q4_K_M quantization)"
    size_gb: 8.0
    stack: "stack_b"
  
  # Embedding model (both stacks)
  nomic-embed-text:
    repo_id: "nomic-ai/nomic-embed-text-v1.5-GGUF"
    filename: "nomic-embed-text-v1.5.f16.gguf"
    description: "Nomic Embed Text v1.5"
    size_gb: 0.5
    stack: "both"
